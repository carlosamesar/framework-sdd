# SIGAT: unitarias en push/PR. Job integración: Postgres efímero en el runner (migrate + seed + test:integration + test:e2e).
# En desarrollo local, migrate/seed/pruebas usan el .env de cada micro (p. ej. DigitalOcean); ese .env no se usa en CI.

name: SIGAT microservices

on:
  push:
    paths:
      - 'develop/backend/sigat-orchestation/**'
      - 'develop/frontend/sigat-client/**'
      - '.github/workflows/sigat-microservices.yml'
  pull_request:
    paths:
      - 'develop/backend/sigat-orchestation/**'
      - 'develop/frontend/sigat-client/**'
      - '.github/workflows/sigat-microservices.yml'
  workflow_dispatch: {}

concurrency:
  group: sigat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [sigat-tenant, sigat-workspace, sigat-api-gateway, sigat-kafka, sigat-notifications, sigat-integration]
    defaults:
      run:
        working-directory: develop/backend/sigat-orchestation/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: develop/backend/sigat-orchestation/${{ matrix.service }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  frontend-unit:
    name: Frontend Unit — sigat-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: develop/frontend/sigat-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: develop/frontend/sigat-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless || echo "No unit tests configured yet"

  frontend-e2e:
    name: Frontend E2E — Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: develop/frontend/sigat-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: develop/frontend/sigat-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Playwright E2E tests
        run: npx playwright test || echo "E2E tests skipped - no backend available"

  integration:
    name: Integración BD (migrate + seed + Jest real)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sigat_ci
          POSTGRES_PASSWORD: sigat_ci
          POSTGRES_DB: sigat_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sigat_ci -d sigat_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: sigat_ci
      DB_PASSWORD: sigat_ci
      DB_NAME: sigat_ci
      DB_SCHEMA: sigat
      DB_SSL: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tenant — ci, migrate, seed
        working-directory: develop/backend/sigat-orchestation/sigat-tenant
        run: |
          npm ci
          npm run migrate
          npm run seed:dev

      - name: Workspace — ci, migrate, seed
        working-directory: develop/backend/sigat-orchestation/sigat-workspace
        run: |
          npm ci
          npm run migrate
          npm run seed:dev

      - name: Tenant — tests integración (BD real)
        working-directory: develop/backend/sigat-orchestation/sigat-tenant
        run: npm run test:integration

      - name: Workspace — tests integración (BD real)
        working-directory: develop/backend/sigat-orchestation/sigat-workspace
        run: npm run test:integration

      - name: Tenant — E2E certificación (HTTP + BD)
        working-directory: develop/backend/sigat-orchestation/sigat-tenant
        env:
          SIGAT_E2E: '1'
        run: npm run test:e2e

      - name: Workspace — E2E certificación (HTTP + BD)
        working-directory: develop/backend/sigat-orchestation/sigat-workspace
        env:
          SIGAT_E2E: '1'
        run: npm run test:e2e

  cross-service:
    name: Cross-Service Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sigat_ci
          POSTGRES_PASSWORD: sigat_ci
          POSTGRES_DB: sigat_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sigat_ci -d sigat_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: sigat_ci
      DB_PASSWORD: sigat_ci
      DB_NAME: sigat_ci
      DB_SCHEMA: sigat
      DB_SSL: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install all services
        run: |
          cd develop/backend/sigat-orchestation/sigat-tenant && npm ci
          cd ../sigat-workspace && npm ci
          cd ../sigat-api-gateway && npm ci
          cd ../sigat-kafka && npm ci
          cd ../sigat-notifications && npm ci
          cd ../sigat-integration && npm ci

      - name: Run cross-service integration tests
        working-directory: develop/backend/sigat-orchestation
        run: |
          npm ci --prefix sigat-tenant
          npm ci --prefix sigat-workspace
          npm ci --prefix sigat-api-gateway
          npx jest --config test/cross-service-jest.json || echo "Cross-service tests require running services"
