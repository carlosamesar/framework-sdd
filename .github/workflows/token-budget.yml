name: token-budget

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  verify-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify token savings
        run: npm run token:check
